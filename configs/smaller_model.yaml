# Secondary "smaller-model anchor" condition: Qwen2.5-Coder-7B-Instruct.
#
# Used for the secondary table demonstrating the framework's gains
# generalize down to a 7B-class single-backbone model. We keep this row
# because reviewers often ask whether claims hold at the small-model
# end of the spectrum.

models:
  planner:
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q4_K_M
  generator:
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q4_K_M
  reviewer:
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q4_K_M
  optimizer:
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q4_K_M
  explainer:
    provider: ollama
    model: qwen2.5-coder:7b-instruct-q4_K_M

execution:
  timeout_s: 5.0

run:
  n_trials: 3
  retry_budget: 2
